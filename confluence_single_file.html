<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confluence — Guardians of our Waters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#04101c;
    --bg1:#071827;
    --bg2:#0d2740;
    --bg3:#123b56;
    --panel:rgba(10,24,39,0.68);
    --panel2:rgba(16,35,57,0.84);
    --panel3:rgba(255,255,255,0.04);
    --line:rgba(255,255,255,0.11);
    --line2:rgba(255,255,255,0.22);
    --text:#edf6ff;
    --dim:#b7cbe0;
    --mute:#7a90a8;
    --cyan:#74e6ff;
    --cyan2:#8ff1ff;
    --green:#7df2b4;
    --amber:#ffd17e;
    --red:#ff8585;
    --violet:#b6a6ff;
    --warn:#ffb067;
    --gold:#ffe090;
    --shadow:0 18px 48px rgba(0,0,0,.4);
    --shadow-sm:0 6px 18px rgba(0,0,0,.3);
    --r:20px;
    --r-sm:12px;
    --r-xs:8px;
  }
  *{box-sizing:border-box}
  html,body{height:100%; margin:0}
  body{
    color:var(--text);
    font-family:Manrope,system-ui,sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(116,230,255,.09), transparent 30%),
      radial-gradient(circle at 85% 15%, rgba(182,166,255,.09), transparent 28%),
      radial-gradient(circle at 75% 85%, rgba(125,242,180,.07), transparent 28%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 55%, var(--bg0) 100%);
    min-height:100vh;
    overflow-x:hidden;
  }
  .ambient{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0}
  .wave{
    position:absolute; left:-12%; width:124%; height:240px; border-radius:45%;
    background:linear-gradient(180deg, rgba(116,230,255,.08), rgba(255,255,255,0));
    filter:blur(16px);
    animation:drift 22s ease-in-out infinite;
  }
  .wave.w1{bottom:6%; opacity:.55; animation-duration:24s}
  .wave.w2{bottom:0; opacity:.4; transform:scaleX(1.1); animation-duration:30s}
  .wave.w3{bottom:-4%; opacity:.3; animation-duration:36s}
  @keyframes drift{
    0%,100%{transform:translateX(-3%) rotate(-0.3deg)}
    50%{transform:translateX(3%) rotate(0.3deg)}
  }
  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.045;
    background-image:
      radial-gradient(rgba(255,255,255,.7) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,.5) 1px, transparent 1px);
    background-size:3px 3px, 7px 7px;
    background-position:0 0, 1px 2px;
    mix-blend-mode:overlay;
  }

  .app{
    position:relative; z-index:2;
    max-width:1320px; margin:0 auto;
    padding:20px 26px 40px;
    min-height:100vh;
    display:flex; flex-direction:column; gap:18px;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:16px; backdrop-filter:blur(8px);
  }
  .brand{display:flex; align-items:center; gap:14px}
  .brand-mark{
    width:36px; height:36px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--cyan2), #2a7fa0 70%, #0a2030);
    box-shadow:0 0 24px rgba(116,230,255,.35), inset 0 0 10px rgba(255,255,255,.15);
    position:relative;
  }
  .brand-mark::after{
    content:""; position:absolute; inset:6px; border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.3), transparent 45%);
  }
  .brand-title{
    font-family:Fraunces,serif; font-weight:500; font-size:20px; letter-spacing:.02em;
    font-style:italic;
  }
  .brand-sub{font-size:11px; color:var(--mute); letter-spacing:.24em; text-transform:uppercase; margin-top:-2px}
  .tools{display:flex; gap:8px}
  .ghost{
    background:transparent; color:var(--dim);
    border:1px solid var(--line); padding:7px 13px; border-radius:999px;
    font:inherit; font-size:12px; cursor:pointer; letter-spacing:.03em;
    transition:border-color .18s, color .18s, background .18s;
  }
  .ghost:hover{color:var(--text); border-color:var(--cyan); background:rgba(116,230,255,.06)}
  .ghost:focus-visible{outline:2px solid var(--cyan); outline-offset:2px}

  #stage{min-height:70vh}
  .screen{
    padding:4px 0 12px;
    animation:fadeIn .55s ease both;
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}

  .panel{
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--r); padding:28px; box-shadow:var(--shadow);
    backdrop-filter:blur(10px);
  }
  .panel.soft{background:var(--panel2)}
  .panel.flat{background:var(--panel3); box-shadow:none}

  /* Hero */
  .hero{
    display:grid; grid-template-columns:1.35fr 1fr; gap:22px; align-items:stretch;
  }
  @media(max-width:940px){ .hero{grid-template-columns:1fr} }
  .kicker{
    font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--cyan); font-weight:600;
  }
  .display-title{
    font-family:Fraunces,serif; font-weight:500; font-style:italic;
    font-size:clamp(44px,7vw,74px); line-height:.98;
    letter-spacing:-0.01em; margin:14px 0 6px;
    background:linear-gradient(180deg, #f4fbff 20%, #a9d8ec 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .display-title em{font-style:normal; color:var(--cyan); -webkit-text-fill-color:var(--cyan)}
  .lead{
    color:var(--dim); font-size:16px; line-height:1.55; max-width:58ch; margin:12px 0 16px;
  }
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 20px}
  .chip{
    font-size:11.5px; padding:5px 11px; border-radius:999px;
    border:1px solid var(--line2); color:var(--dim);
    background:rgba(255,255,255,.03); letter-spacing:.02em;
  }
  .chip.accent{color:var(--cyan); border-color:rgba(116,230,255,.4); background:rgba(116,230,255,.06)}

  .narration{
    font-family:Fraunces,serif; font-style:italic; font-weight:400;
    font-size:15.5px; line-height:1.55; color:var(--dim);
    padding:16px 18px; border-left:2px solid var(--cyan);
    background:rgba(116,230,255,.04); border-radius:0 12px 12px 0; margin:10px 0 22px;
  }

  .actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:6px}
  .primary{
    background:linear-gradient(180deg, var(--cyan) 0%, #3fb9da 100%);
    color:#03202c; border:none; padding:13px 22px; border-radius:999px;
    font:inherit; font-weight:600; font-size:14px; letter-spacing:.03em;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(116,230,255,.22), inset 0 0 0 1px rgba(255,255,255,.2);
    transition:transform .12s, box-shadow .18s;
  }
  .primary:hover{transform:translateY(-1px); box-shadow:0 12px 30px rgba(116,230,255,.3)}
  .primary:disabled{opacity:.5; cursor:not-allowed; transform:none}
  .secondary{
    background:transparent; color:var(--text);
    border:1px solid var(--line2); padding:12px 20px; border-radius:999px;
    font:inherit; font-weight:500; font-size:14px; cursor:pointer;
    transition:border-color .18s, background .18s;
  }
  .secondary:hover{border-color:var(--cyan); background:rgba(116,230,255,.05)}

  /* Side stats */
  .stat-stack{display:flex; flex-direction:column; gap:10px}
  .stat{
    padding:14px 16px; border-radius:14px; border:1px solid var(--line);
    background:rgba(255,255,255,.02);
  }
  .stat .label{font-size:11px; color:var(--mute); text-transform:uppercase; letter-spacing:.22em}
  .stat .value{font-family:Fraunces,serif; font-style:italic; font-size:20px; margin-top:4px}
  .stat .value.mono{font-family:'JetBrains Mono',monospace; font-style:normal; font-weight:500; font-size:17px}

  /* Setup */
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  @media(max-width:720px){.grid-2{grid-template-columns:1fr}}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:10px}
  .field label{font-size:12px; color:var(--mute); text-transform:uppercase; letter-spacing:.18em}
  .field input, .field select{
    background:rgba(255,255,255,.03); border:1px solid var(--line2);
    color:var(--text); padding:11px 14px; border-radius:10px;
    font:inherit; font-size:14px;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--cyan); background:rgba(116,230,255,.04)}

  .country-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:10px; margin-top:8px}
  .country-card{
    padding:14px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,.02); cursor:pointer;
    transition:border-color .18s, transform .1s, background .18s;
    position:relative;
  }
  .country-card:hover{border-color:var(--cyan); background:rgba(116,230,255,.05)}
  .country-card.selected{border-color:var(--cyan); background:rgba(116,230,255,.08); box-shadow:inset 0 0 0 1px var(--cyan)}
  .country-card.taken{opacity:.38; pointer-events:none}
  .country-card .flag-row{display:flex; align-items:center; gap:10px}
  .country-card .cc{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mute);
    padding:2px 7px; border:1px solid var(--line2); border-radius:6px;
  }
  .country-card h4{font-family:Fraunces,serif; font-weight:500; font-style:italic; margin:8px 0 2px; font-size:18px}
  .country-card p{font-size:12px; color:var(--mute); margin:0; line-height:1.4}
  .country-card .owner-tag{
    position:absolute; top:10px; right:10px;
    font-size:10px; padding:3px 8px; border-radius:999px;
    background:var(--cyan); color:#03202c; font-weight:600; letter-spacing:.05em;
  }

  /* Map */
  .map-wrap{
    position:relative; border-radius:var(--r); overflow:hidden;
    background:radial-gradient(ellipse at center, rgba(18,59,86,.8), rgba(7,24,39,.9));
    border:1px solid var(--line); aspect-ratio: 4/3; min-height:360px;
  }
  .map-svg{width:100%; height:100%; display:block}
  .map-svg .country{
    fill:rgba(116,230,255,.08); stroke:rgba(116,230,255,.28); stroke-width:.5;
    transition:fill .28s;
  }
  .map-svg .country.active{fill:rgba(116,230,255,.22); stroke:var(--cyan)}
  .map-svg .country.downstream{fill:rgba(255,209,126,.18); stroke:var(--amber)}
  .map-svg .country.epicenter{fill:rgba(255,133,133,.22); stroke:var(--red)}
  .map-svg .country-label{
    font-family:'JetBrains Mono',monospace; font-size:9px; fill:var(--dim);
    pointer-events:none; letter-spacing:.1em;
  }
  .map-svg .station{
    fill:var(--cyan); filter:drop-shadow(0 0 6px rgba(116,230,255,.5));
    cursor:default;
  }
  .map-svg .station.epicenter{fill:var(--red); filter:drop-shadow(0 0 10px rgba(255,133,133,.7))}
  .map-svg .station.downstream{fill:var(--amber); filter:drop-shadow(0 0 8px rgba(255,209,126,.6))}
  .map-svg .station-label{
    font-family:Manrope,sans-serif; font-weight:600; font-size:10px; fill:var(--text);
    pointer-events:none;
  }
  .map-svg .connection{
    stroke:rgba(116,230,255,.2); stroke-width:.7; stroke-dasharray:2 3; fill:none;
  }
  .map-svg .pulse{
    fill:none; stroke:var(--red); stroke-width:1.2; opacity:0;
    animation:pulse 2.4s ease-out infinite;
  }
  @keyframes pulse{
    0%{opacity:.9; r:3}
    100%{opacity:0; r:28}
  }
  .map-overlay{
    position:absolute; left:14px; bottom:14px;
    padding:8px 12px; background:rgba(4,16,28,.7); border:1px solid var(--line);
    border-radius:8px; font-size:11px; color:var(--dim);
    font-family:'JetBrains Mono',monospace; letter-spacing:.1em;
  }

  /* Round screen */
  .round-grid{display:grid; grid-template-columns:1.25fr 1fr; gap:18px; align-items:start}
  @media(max-width:980px){.round-grid{grid-template-columns:1fr}}

  .roll-stage{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:30px 24px;
  }
  .die{
    width:120px; height:120px;
    background:
      linear-gradient(135deg, rgba(116,230,255,.35) 0%, rgba(116,230,255,.08) 50%, rgba(6,36,58,.8) 100%);
    border-radius:22px; border:1px solid rgba(116,230,255,.4);
    display:flex; align-items:center; justify-content:center;
    font-family:Fraunces,serif; font-style:italic; font-size:15px; color:var(--text);
    box-shadow:0 0 30px rgba(116,230,255,.25), inset 0 0 20px rgba(255,255,255,.08);
    text-align:center; padding:10px; line-height:1.15;
    transform-style:preserve-3d;
  }
  .die.rolling{animation:dieSpin 1.8s cubic-bezier(.22,.72,.2,1)}
  @keyframes dieSpin{
    0%{transform:rotateX(0) rotateY(0) scale(.95)}
    50%{transform:rotateX(540deg) rotateY(360deg) scale(1.05)}
    100%{transform:rotateX(1080deg) rotateY(720deg) scale(1)}
  }
  .roll-label{
    font-family:Fraunces,serif; font-style:italic; font-weight:500; font-size:26px;
    margin-top:6px; text-align:center;
  }
  .roll-desc{color:var(--dim); font-size:14px; text-align:center; max-width:46ch}

  .round-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
    flex-wrap:wrap; gap:12px;
  }
  .round-index{
    font-family:Fraunces,serif; font-style:italic; font-weight:500; font-size:30px;
  }
  .round-index .n{color:var(--cyan)}
  .round-meta{display:flex; gap:8px; flex-wrap:wrap}
  .tag{
    font-size:11px; padding:5px 10px; border-radius:6px;
    font-family:'JetBrains Mono',monospace; letter-spacing:.06em;
    border:1px solid var(--line2); color:var(--dim);
  }
  .tag.cyan{color:var(--cyan); border-color:rgba(116,230,255,.35); background:rgba(116,230,255,.06)}
  .tag.amber{color:var(--amber); border-color:rgba(255,209,126,.35); background:rgba(255,209,126,.06)}
  .tag.red{color:var(--red); border-color:rgba(255,133,133,.35); background:rgba(255,133,133,.06)}

  /* Broadcast */
  .broadcast{
    padding:18px 20px; border-radius:14px;
    border:1px solid rgba(255,209,126,.3); background:rgba(255,209,126,.04);
    margin-top:14px;
  }
  .broadcast .bc-head{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em;
    color:var(--amber); text-transform:uppercase; margin-bottom:8px;
  }
  .broadcast .bc-body{font-size:15px; line-height:1.55}

  /* Team bar */
  .teambar{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:12px;
    margin-top:14px;
  }
  .team-card{
    padding:14px 16px; border-radius:14px; border:1px solid var(--line);
    background:rgba(255,255,255,.03);
    display:flex; flex-direction:column; gap:8px;
    position:relative; overflow:hidden;
  }
  .team-card.ready{border-color:var(--green); background:rgba(125,242,180,.06)}
  .team-card.done{border-color:var(--cyan); background:rgba(116,230,255,.06)}
  .team-card h4{margin:0; font-family:Fraunces,serif; font-style:italic; font-weight:500; font-size:17px}
  .team-card .meta{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .team-card .country{font-size:12px; color:var(--mute); font-family:'JetBrains Mono',monospace; letter-spacing:.08em}
  .team-card .score-tag{
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    color:var(--cyan);
  }
  .team-card .resources{display:flex; gap:10px; font-size:11px; color:var(--dim); font-family:'JetBrains Mono',monospace}
  .team-card .resources span strong{color:var(--text); font-weight:600}
  .team-card .state{
    font-size:11px; color:var(--mute); letter-spacing:.14em; text-transform:uppercase;
  }
  .team-card button{margin-top:4px}

  /* Modal */
  .modal-bg{
    position:fixed; inset:0; background:rgba(2,10,18,.76); backdrop-filter:blur(8px);
    display:none; align-items:center; justify-content:center; z-index:100; padding:16px;
  }
  .modal-bg.open{display:flex; animation:fadeIn .2s ease}
  .modal{
    max-width:780px; width:100%; max-height:92vh; overflow-y:auto;
    background:var(--bg1); border:1px solid var(--line2); border-radius:var(--r);
    padding:26px 28px; box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .modal h3{font-family:Fraunces,serif; font-style:italic; font-weight:500; font-size:26px; margin:0 0 6px}
  .modal .sub{color:var(--dim); font-size:13px; margin-bottom:16px}

  /* Console */
  .console-top{display:flex; justify-content:space-between; align-items:start; gap:16px; flex-wrap:wrap}
  .console-identity{display:flex; flex-direction:column; gap:4px}
  .console-identity .team-id{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--cyan); letter-spacing:.14em;
  }
  .console-identity h3{margin:0}
  .resource-bar{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  }
  .res-pill{
    padding:6px 10px; border-radius:8px; font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.08em;
    border:1px solid var(--line2); display:flex; align-items:center; gap:6px;
  }
  .res-pill .dot{width:7px; height:7px; border-radius:50%; background:var(--cyan)}
  .res-pill.tokens .dot{background:var(--violet)}

  .readings-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px;
    margin:12px 0;
  }
  .reading{
    padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    background:rgba(255,255,255,.025);
    display:flex; flex-direction:column; gap:2px;
    position:relative;
  }
  .reading .p-name{font-size:10px; color:var(--mute); letter-spacing:.12em; text-transform:uppercase}
  .reading .p-val{
    font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:600; color:var(--text);
  }
  .reading .p-range{font-size:10px; color:var(--mute); font-family:'JetBrains Mono',monospace}
  .reading.warn{border-color:rgba(255,209,126,.5); background:rgba(255,209,126,.05)}
  .reading.warn .p-val{color:var(--amber)}
  .reading.crit{border-color:rgba(255,133,133,.55); background:rgba(255,133,133,.05)}
  .reading.crit .p-val{color:var(--red)}
  .reading.hidden{border-style:dashed; border-color:var(--mute)}
  .reading.hidden .p-val{color:var(--mute); letter-spacing:.1em}
  .reading .reveal-btn{
    position:absolute; top:6px; right:6px;
    background:transparent; color:var(--violet); border:1px solid rgba(182,166,255,.5);
    border-radius:6px; padding:2px 7px; font:inherit; font-size:10px; cursor:pointer;
    letter-spacing:.08em;
  }
  .reading .reveal-btn:hover{background:rgba(182,166,255,.1)}

  .observations{
    padding:10px 12px; background:rgba(255,255,255,.025);
    border:1px solid var(--line); border-radius:10px;
    font-size:13px; line-height:1.55; color:var(--dim); margin:10px 0;
  }
  .observations strong{color:var(--text)}
  .observations ul{margin:4px 0 0; padding-left:18px}
  .observations li{margin:2px 0}

  /* Questions */
  .q{margin:14px 0}
  .q-head{
    display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:6px;
  }
  .q-head .qtext{font-size:14px; font-weight:600}
  .q-head .qpts{
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--mute);
    letter-spacing:.1em; white-space:nowrap;
  }
  .opts{display:flex; flex-direction:column; gap:6px}
  .opt{
    display:flex; align-items:center; gap:10px; cursor:pointer;
    padding:9px 12px; border-radius:10px;
    border:1px solid var(--line); background:rgba(255,255,255,.02);
    transition:border-color .15s, background .15s;
    font-size:13.5px;
  }
  .opt:hover{border-color:var(--cyan); background:rgba(116,230,255,.04)}
  .opt.selected{border-color:var(--cyan); background:rgba(116,230,255,.1)}
  .opt input{accent-color:var(--cyan); flex:0 0 auto}
  .opt.correct{border-color:var(--green); background:rgba(125,242,180,.09)}
  .opt.wrong{border-color:var(--red); background:rgba(255,133,133,.07); opacity:.8}
  .opt .mini-badge{
    font-family:'JetBrains Mono',monospace; font-size:10px; margin-left:auto;
    letter-spacing:.1em; padding:2px 6px; border-radius:4px;
  }
  .opt.correct .mini-badge{background:rgba(125,242,180,.15); color:var(--green)}
  .opt.wrong .mini-badge{background:rgba(255,133,133,.12); color:var(--red)}

  /* Exchange */

function tone(freq=440, dur=0.12, type='sine', gain=0.025, when=0){
  if (!state.audioEnabled || !state.soundUnlocked || !state.audioCtx) return;
  const ctx = state.audioCtx;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(ctx.destination);
  const t0 = ctx.currentTime + when;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.start(t0); o.stop(t0+dur+0.02);
}
function chord(freqs, dur=0.3, type='sine', gain=0.02){

    const sig = PRESSURES.find(pr => pr.id === pressureId).signature[intensity];
    if (sig && sig[p.id]){
      const [lo, hi] = sig[p.id];
      readings[p.id] = +rand(lo, hi).toFixed(p.decimals);
    } else {
      const [lo, hi] = BASELINE[p.id];
      readings[p.id] = +rand(lo, hi).toFixed(p.decimals);
    }
  });
  return readings;
}

function generateEvent(roundIdx){
  // Choose a round context
  let ctx;
  if (roundIdx === 0){
    // Start with Pollution Alert for clarity
    ctx = ROUND_CONTEXTS.find(c => c.id === 'pollution');
  } else if (roundIdx === state.totalRounds-1){
    ctx = ROUND_CONTEXTS.find(c => c.id === 'crossborder');
  } else {
    // Random from all contexts, but try not to repeat the immediate last
    ctx = pick(ROUND_CONTEXTS.filter(c => c.id !== (state.currentContext?.id)));
  }

  // Choose pressure, avoiding repeats if possible
  const available = PRESSURES.filter(p => !state.usedPressureTypes.includes(p.id));
  const pressure = available.length > 0 ? pick(available) : pick(PRESSURES);
  state.usedPressureTypes.push(pressure.id);

  // Pick epicenter among teams' countries (so at least one team sees strong signal)
  const teamCodes = state.teams.map(t => t.code);
  const epicenterCode = pick(teamCodes);
  const epicenterStation = STATION_BY_CODE[epicenterCode];

  // Downstream: 1-2 linked countries among participating teams
  const linked = epicenterStation.adj.filter(c => teamCodes.includes(c));
  const downstreamCount = ctx.modifier === 'force-link' ? Math.max(1, linked.length>0?1:0) : randInt(0, Math.min(1, linked.length));
  const downstreamCodes = shuffle(linked).slice(0, downstreamCount);

  // Readings per team
  const readingsByTeam = {};
  state.teams.forEach(t => {
    let intensity;
    if (t.code === epicenterCode) intensity = 'strong';
    else if (downstreamCodes.includes(t.code)) intensity = 'weak';
    else intensity = 'normal';
    readingsByTeam[t.code] = genReadings(pressure.id, intensity, ctx);
  });

  // Hide one parameter for Field Test
  let hiddenParam = null;
  if (ctx.modifier === 'hide-one'){
    // Hide a parameter that MATTERS for this pressure, on the epicenter team
    hiddenParam = pick(pressure.exceedances);
  }

  // Build broadcast
  const contextNote = pick(CONTEXT_LIBRARY[pressure.id]);
  const broadcast = `Monitoring network flagged an incident centered at ${epicenterStation.name} (${STATION_BY_CODE[epicenterCode].name}). ${contextNote}`;

  // Scope label
  let scope = 'Local';
  if (downstreamCodes.length === 1) scope = 'Linked';
  if (downstreamCodes.length >= 2 || ctx.modifier === 'force-link') scope = 'Watershed';

  return {
    pressure,
    context: ctx,
    epicenterCode,
    downstreamCodes,
    readingsByTeam,
    hiddenParam,
    broadcast,
    contextNote,
    scope
  };
}

// TEAM UTILITIES
// =========================================================
function initTeam(name, code){
  return {
    name, code,
    score:0,
    credits:5,
    tokens:2,
    roundAnswers:null,   // { classification, thresholds:[], intervention, advisory }
    exchangeLog:[],
    hiddenRevealed:false // per-round flag
  };
}

function getTeamReadings(team){
  const r = state.currentEvent.readingsByTeam[team.code];
  return r;
}

function classifyReadingStatus(paramId, value){
  const p = PARAM_BY_ID[paramId];
  // Check safe ranges
  if (p.safeMin !== undefined && value < p.safeMin){
    if (p.warnMin !== undefined && value < p.warnMin) return 'crit';
    return 'warn';
  }
  if (p.safeMax !== undefined && value > p.safeMax){
    if (p.warnMax !== undefined && value > p.warnMax) return 'crit';
    return 'warn';
  }
  return 'ok';
}

function getTeamExceedances(team){
  const readings = getTeamReadings(team);
  const exc = [];
  PARAMS.forEach(p => {
    if (state.currentEvent.hiddenParam === p.id && team.code === state.currentEvent.epicenterCode && !team.hiddenRevealed) return;
    const s = classifyReadingStatus(p.id, readings[p.id]);
    if (s === 'warn' || s === 'crit') exc.push(p.id);
  });
  return exc;
}

// =========================================================
// SCORING (fully deterministic)
// =========================================================
function scoreTeamRound(team){
  const ev = state.currentEvent;
  const pressure = ev.pressure;
  const ans = team.roundAnswers;
  if (!ans) return { total:0, breakdown:{}, crossBorder:false };

  const intensity = team.code === ev.epicenterCode ? 'strong'
                  : ev.downstreamCodes.includes(team.code) ? 'weak'
                  : 'normal';

  const expectedExc = (intensity === 'weak')
    ? (pressure.weakExceedances || pressure.exceedances)
    : (intensity === 'strong' ? pressure.exceedances : []);

  // Q1 Classification
  const classifyPts = ans.classification === pressure.id ? 3 : 0;

  // Q2 Thresholds — set comparison, only counts if team exposure is strong or weak (skip if normal)
  let thresholdPts = 0;
  let thresholdExpected = expectedExc;
  if (intensity === 'normal'){
    // For a team with normal readings, "no exceedances" is technically correct — award full 2 only if they selected none
    thresholdExpected = [];
  }
  const sel = new Set(ans.thresholds || []);
  const exp = new Set(thresholdExpected);
  let match = 0;
  exp.forEach(id => { if (sel.has(id)) match++; });
  let extras = 0;
  sel.forEach(id => { if (!exp.has(id)) extras++; });
  if (exp.size === 0 && sel.size === 0) thresholdPts = 2;
  else if (match === exp.size && extras === 0) thresholdPts = 2;
  else if (match >= Math.max(1, exp.size-1) && extras <= 1) thresholdPts = 1;
  else thresholdPts = 0;

  // Q3 Intervention
  const interventionPts = ans.intervention === pressure.intervention ? 3 : 0;

  // Q4 Advisory
  const advisoryPts = ans.advisory === pressure.advisory ? 2 : 0;

  // Cross-border bonus: awarded if team is "weak" (downstream) and classification is correct
  // AND team made at least one successful data exchange this round
  let crossBorderBonus = 0;
  let crossBorder = false;
  if (intensity === 'weak' && classifyPts === 3 && team.exchangeLog.length > 0){
    crossBorderBonus = 1;
    crossBorder = true;
  }

  const total = classifyPts + thresholdPts + interventionPts + advisoryPts + crossBorderBonus;

  return {
    total,
    breakdown:{
      classification:classifyPts,
      thresholds:thresholdPts,
      intervention:interventionPts,
      advisory:advisoryPts,
      crossBorder:crossBorderBonus
    },
    crossBorder
  };
}

// Simplified country shapes (representative polygons, not cartographic)
const COUNTRY_SHAPES = {
  ES: 'M120,300 L180,290 L210,310 L240,340 L230,380 L190,400 L140,395 L100,370 L90,335 Z',
  FR: 'M250,200 L330,190 L370,210 L380,250 L350,290 L310,300 L270,290 L240,260 L230,225 Z',
  IT: 'M450,260 L480,250 L495,280 L510,320 L505,360 L480,380 L470,360 L460,330 L450,295 Z',
  SK: 'M470,155 L540,150 L560,175 L545,200 L500,205 L475,190 Z',
  GR: 'M555,370 L610,360 L620,390 L605,430 L580,445 L555,430 L548,400 Z',
  BG: 'M610,210 L680,205 L695,235 L680,270 L640,275 L615,255 Z'
};

function renderMap(highlight = true){
  const svgNs = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNs, 'svg');
  svg.setAttribute('viewBox', '0 0 800 500');
  svg.classList.add('map-svg');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'Europe water-monitoring map');

  // Connection lines between adjacent stations
  const drawnConnections = new Set();
  STATIONS.forEach(s => {
    s.adj.forEach(adjCode => {
      const key = [s.code, adjCode].sort().join('-');
      if (drawnConnections.has(key)) return;
      drawnConnections.add(key);
      const target = STATION_BY_CODE[adjCode];
      const line = document.createElementNS(svgNs, 'line');
      line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
      line.setAttribute('x2', target.x); line.setAttribute('y2', target.y);
      line.classList.add('connection');
      svg.appendChild(line);
    });
  });

  // Country shapes
  STATIONS.forEach(s => {
    const path = document.createElementNS(svgNs, 'path');
    path.setAttribute('d', COUNTRY_SHAPES[s.code]);
    path.classList.add('country');
    const isTeam = state.teams.some(t => t.code === s.code);
    if (isTeam) path.classList.add('active');
    if (state.currentEvent && highlight){
      if (s.code === state.currentEvent.epicenterCode) path.classList.add('epicenter');
      else if (state.currentEvent.downstreamCodes.includes(s.code)) path.classList.add('downstream');
    }
    svg.appendChild(path);

    const lbl = document.createElementNS(svgNs, 'text');
    lbl.setAttribute('x', s.x);
    lbl.setAttribute('y', s.y + 22);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.classList.add('country-label');
    lbl.textContent = s.code;
    svg.appendChild(lbl);
  });

  // Stations
  STATIONS.forEach(s => {
    const c = document.createElementNS(svgNs, 'circle');
    c.setAttribute('cx', s.x); c.setAttribute('cy', s.y); c.setAttribute('r', 5);
    c.classList.add('station');
    if (state.currentEvent && highlight){
      if (s.code === state.currentEvent.epicenterCode) c.classList.add('epicenter');
      else if (state.currentEvent.downstreamCodes.includes(s.code)) c.classList.add('downstream');
    }
    svg.appendChild(c);

    // Team name label on team stations
    const isTeam = state.teams.find(t => t.code === s.code);
    if (isTeam){
      const name = document.createElementNS(svgNs, 'text');
      name.setAttribute('x', s.x);
      name.setAttribute('y', s.y - 10);
      name.setAttribute('text-anchor', 'middle');
      name.classList.add('station-label');
      name.textContent = isTeam.name;
      svg.appendChild(name);
    }
  });

  // Pulse at epicenter
  if (state.currentEvent && highlight){
    const ep = STATION_BY_CODE[state.currentEvent.epicenterCode];
    for (let i = 0; i < 3; i++){
      const pulse = document.createElementNS(svgNs, 'circle');
      pulse.setAttribute('cx', ep.x); pulse.setAttribute('cy', ep.y); pulse.setAttribute('r', 5);
      pulse.classList.add('pulse');
      pulse.style.animationDelay = (i * 0.8) + 's';
      svg.appendChild(pulse);
    }
  }

  return svg;
}

      openConsole(idx);
    });
  });

  const allDone = state.teams.every(t => !!t.roundAnswers);
  const btn = $('#toResolution');
  if (btn){
    btn.disabled = !allDone;
    btn.textContent = allDone ? 'Submit & Resolve' : `Waiting on ${state.teams.filter(t=>!t.roundAnswers).length} team(s)`;
    btn.onclick = ()=> { if (!allDone) return; playTransition(); go('resolution'); };
  }
}

// --- CONSOLE MODAL ---
function openConsole(teamIdx){
  const team = state.teams[teamIdx];
  const ev = state.currentEvent;
  const readings = getTeamReadings(team);

  // Pre-populate pressures options (shuffled for this team)
  const pressureOpts = shuffle(PRESSURES.slice()).slice(0);
  const correctInterv = ev.pressure.intervention;
  const interventionOpts = shuffle([correctInterv, ...ev.pressure.wrongInterv]);
  const correctAdv = ev.pressure.advisory;
  const advisoryOpts = shuffle([correctAdv, ...ev.pressure.wrongAdv]);

  // Temporary answer state
  const ans = {
    classification: null,
    thresholds: new Set(),
    intervention: null,
    advisory: null
  };

  const renderReadings = ()=>{
    return PARAMS.map(p => {
      const val = readings[p.id];
      const isHidden = ev.hiddenParam === p.id && team.code === ev.epicenterCode && !team.hiddenRevealed;
      const status = !isHidden ? classifyReadingStatus(p.id, val) : 'ok';
      const cls = isHidden ? 'hidden' : (status === 'crit' ? 'crit' : status === 'warn' ? 'warn' : '');
      const rangeText = (p.safeMin !== undefined && p.safeMax !== undefined) ? `safe ${p.safeMin}–${p.safeMax}` :
                       (p.safeMin !== undefined) ? `safe ≥ ${p.safeMin}` :
                       (p.safeMax !== undefined) ? `safe ≤ ${p.safeMax}` : '';
      return `
        <div class="reading ${cls}">
          <span class="p-name">${p.name}</span>
          <span class="p-val">${isHidden ? '— offline —' : fmt(val, p.decimals)}${(!isHidden && p.unit) ? ' <span style="font-size:11px;color:var(--mute)">'+p.unit+'</span>' : ''}</span>
          <span class="p-range">${rangeText}${p.unit && rangeText ? ' '+p.unit : ''}</span>
          ${isHidden && team.tokens > 0 ? `<button class="reveal-btn" data-reveal="${p.id}">Use token</button>` : ''}
        </div>
      `;
    }).join('');
  };

  const renderBody = ()=>{
    return `
      <div class="console-top">
        <div class="console-identity">
          <div class="team-id">${team.code} · ${escapeHtml(STATION_BY_CODE[team.code].station).toUpperCase()}</div>
          <h3>${escapeHtml(team.name)} — Station Console</h3>
          <div class="sub">Round ${state.roundIndex+1} · ${escapeHtml(ev.context.name)} · Scope: ${ev.scope}</div>
        </div>
        <div class="resource-bar">
          <span class="res-pill"><span class="dot"></span>Intel <strong id="resCredits">${team.credits}</strong></span>
          <span class="res-pill tokens"><span class="dot"></span>Tokens <strong id="resTokens">${team.tokens}</strong></span>
        </div>
      </div>

      <div class="observations">
        <strong>Field context:</strong> ${escapeHtml(ev.contextNote)}
      </div>

      <div class="kicker" style="margin-top:8px">Your station readings</div>
      <div class="readings-grid" id="readingsGrid">${renderReadings()}</div>

      <div class="exchange" id="exchange">
        <h4>Intel Exchange — 1 credit per request</h4>
        <div class="xrow">
          <select id="xStation">${state.teams.filter(t=>t.code!==team.code).map(t=>`<option value="${t.code}">${escapeHtml(t.name)} (${t.code})</option>`).join('')}</select>
          <select id="xParam">${PARAMS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
          <button id="xRequest" ${team.credits<=0?'disabled':''}>Request (-1)</button>
        </div>
        <div class="exchange-log" id="xLog">
          ${team.exchangeLog.length === 0 ? '<div style="color:var(--mute)">No exchanges yet.</div>' : team.exchangeLog.map(e=>`<div>· ${escapeHtml(e)}</div>`).join('')}
        </div>
      </div>

      <hr class="div">

      <div class="q">
        <div class="q-head"><span class="qtext">Q1. Classify the pressure.</span><span class="qpts">+3 pts</span></div>
        <div class="opts" id="qClass">
          ${pressureOpts.map(p => `
            <label class="opt" data-class="${p.id}">
              <input type="radio" name="qClass" value="${p.id}">
              <span>${escapeHtml(p.name)}<span style="color:var(--mute); font-size:11.5px; display:block">${escapeHtml(p.blurb)}</span></span>
            </label>
          `).join('')}
        </div>
      </div>

      <div class="q">
        <div class="q-head"><span class="qtext">Q2. Which parameters exceed safe thresholds? (Select all that apply.)</span><span class="qpts">+2 pts</span></div>
        <div class="opts" id="qThresh">
          ${PARAMS.map(p => `
            <label class="opt" data-thresh="${p.id}">
              <input type="checkbox" value="${p.id}">
              <span>${escapeHtml(p.name)} <span style="color:var(--mute); font-size:11.5px">(safe ${p.safeMin!==undefined?'≥ '+p.safeMin:''}${p.safeMin!==undefined&&p.safeMax!==undefined?' – ':''}${p.safeMax!==undefined?'≤ '+p.safeMax:''}${p.unit?' '+p.unit:''})</span></span>
            </label>
          `).join('')}
        </div>
      </div>

      <div class="q">
        <div class="q-head"><span class="qtext">Q3. Best first action?</span><span class="qpts">+3 pts</span></div>
        <div class="opts" id="qInterv">
          ${interventionOpts.map(o => `
            <label class="opt" data-interv="${escapeHtml(o)}">
              <input type="radio" name="qInterv" value="${escapeHtml(o)}">
              <span>${escapeHtml(o)}</span>
            </label>
          `).join('')}
        </div>
      </div>

      <div class="q">
        <div class="q-head"><span class="qtext">Q4. Public advisory?</span><span class="qpts">+2 pts</span></div>
        <div class="opts" id="qAdv">
          ${advisoryOpts.map(o => `
            <label class="opt" data-adv="${escapeHtml(o)}">
              <input type="radio" name="qAdv" value="${escapeHtml(o)}">
              <span>${escapeHtml(o)}</span>
            </label>
          `).join('')}
        </div>
      </div>

      <div class="row" style="margin-top:18px">
        <button class="secondary" id="consoleCancel">Close (not submitted)</button>
        <button class="primary end" id="consoleSubmit" disabled>Lock in answers</button>
      </div>
      <p class="note" style="margin-top:8px">Answers cannot be changed after submission. Confidence is useful. Accuracy is better.</p>
    `;
  };

  openModal(renderBody());

  const validate = ()=> {
    const ok = ans.classification && ans.intervention && ans.advisory;
    document.getElementById('consoleSubmit').disabled = !ok;
  };

  // Reading reveals
  const bindReveals = ()=> {
    modal.querySelectorAll('[data-reveal]').forEach(b => {
      b.addEventListener('click', ()=>{
        if (team.tokens <= 0) return;
        team.tokens -= 1;
        team.hiddenRevealed = true;
        playReveal();
        // Re-render readings grid
        document.getElementById('readingsGrid').innerHTML = renderReadings();
        document.getElementById('resTokens').textContent = team.tokens;
        bindReveals();
      });
    });
  };
  bindReveals();

  // Intel exchange
  $('#xRequest').addEventListener('click', ()=>{
    if (team.credits <= 0) return;
    const xStation = $('#xStation').value;
    const xParam = $('#xParam').value;
    const target = state.teams.find(t => t.code === xStation);
    if (!target) return;
    const val = state.currentEvent.readingsByTeam[target.code][xParam];
    const p = PARAM_BY_ID[xParam];
    team.credits -= 1;
    const entry = `${target.code} · ${p.name}: ${fmt(val, p.decimals)}${p.unit?' '+p.unit:''}`;
    team.exchangeLog.push(entry);
    playReveal();
    document.getElementById('resCredits').textContent = team.credits;
    const log = document.getElementById('xLog');
    log.innerHTML = team.exchangeLog.map(e=>`<div>· ${escapeHtml(e)}</div>`).join('');
    if (team.credits <= 0) $('#xRequest').disabled = true;
  });

  // Radio/checkbox bindings
  modal.querySelectorAll('[data-class]').forEach(el => {
    el.addEventListener('click', ()=>{
      modal.querySelectorAll('[data-class]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      ans.classification = el.dataset.class;
      playClick();
      validate();
    });
  });
  modal.querySelectorAll('[data-thresh]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName !== 'INPUT'){
        const cb = el.querySelector('input');
        cb.checked = !cb.checked;
      }
      const cb = el.querySelector('input');
      el.classList.toggle('selected', cb.checked);
      if (cb.checked) ans.thresholds.add(el.dataset.thresh);
      else ans.thresholds.delete(el.dataset.thresh);
      playClick();
    });
  });
  modal.querySelectorAll('[data-interv]').forEach(el => {
    el.addEventListener('click', ()=>{
      modal.querySelectorAll('[data-interv]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      ans.intervention = el.dataset.interv;
      playClick();
      validate();
    });
  });
  modal.querySelectorAll('[data-adv]').forEach(el => {
    el.addEventListener('click', ()=>{
      modal.querySelectorAll('[data-adv]').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      ans.advisory = el.dataset.adv;
      playClick();
      validate();
    });
  });

  // Cancel / Submit
  $('#consoleCancel').addEventListener('click', ()=>{ playClick(); closeModal(); renderTeamBar(); });
  $('#consoleSubmit').addEventListener('click', ()=>{
    if (!ans.classification || !ans.intervention || !ans.advisory) return;
    team.roundAnswers = {
      classification: ans.classification,
      thresholds: Array.from(ans.thresholds),
      intervention: ans.intervention,
      advisory: ans.advisory
    };
    playSelect();
    closeModal();
    renderTeamBar();
  });
}

// --- RESOLUTION ---
function renderResolution(){
  const ev = state.currentEvent;
  const pressure = ev.pressure;
  // Score each team
  const results = state.teams.map(t => {
    const r = scoreTeamRound(t);
    t.score += r.total;
    return { team:t, ...r };
  });

  // Determine perfection
  const anyPerfect = results.some(r => r.total >= 10);
  const allWeak = results.every(r => r.total <= 3);

  stage.innerHTML = `
    <section class="screen">
      <div class="round-head">
        <div>
          <div class="kicker">Resolution</div>
          <div class="round-index">Round <span class="n">${state.roundIndex+1}</span> <span style="color:var(--mute)">/ ${state.totalRounds}</span></div>
        </div>
        <div class="round-meta">
          <span class="tag cyan">Context · ${escapeHtml(ev.context.name)}</span>
          <span class="tag amber">Epicenter · ${ev.epicenterCode}</span>
          ${ev.downstreamCodes.length ? `<span class="tag">Linked · ${ev.downstreamCodes.join(', ')}</span>` : ''}
        </div>
      </div>

      <div class="panel">
        <div class="resolution-head">
          <div>
            <div class="true-type"><small>TRUE PRESSURE</small>${escapeHtml(pressure.name)}</div>
            <p class="lead" style="margin-top:8px; max-width:66ch">${escapeHtml(pressure.blurb)}</p>
            <p class="note" style="margin-top:6px"><strong style="color:var(--text)">Correct intervention:</strong> ${escapeHtml(pressure.intervention)}</p>
            <p class="note"><strong style="color:var(--text)">Correct advisory:</strong> ${escapeHtml(pressure.advisory)}</p>
          </div>
          <div style="min-width:240px">
            <div class="stat-stack">
              <div class="stat">
                <div class="label">Threshold exceedances (epicenter)</div>
                <div class="value mono">${pressure.exceedances.map(id=>PARAM_BY_ID[id].name).join(' · ')}</div>
              </div>
              ${ev.downstreamCodes.length ? `<div class="stat"><div class="label">Threshold exceedances (downstream)</div><div class="value mono">${(pressure.weakExceedances||pressure.exceedances).map(id=>PARAM_BY_ID[id].name).join(' · ')}</div></div>` : ''}
            </div>
          </div>
        </div>

        <div class="result-teams">
          ${results.map(r => renderResultCard(r)).join('')}
        </div>

        <hr class="div">
        <p class="note" style="font-family:Fraunces,serif; font-style:italic; font-size:15px; color:var(--dim)">“${escapeHtml(anyPerfect ? pick(FLAVOR.afterPerfect) : allWeak ? pick(FLAVOR.afterWeak) : pressure.flavor)}”</p>

        <div class="actions" style="margin-top:16px">
          <button class="primary" id="nextRound">${state.roundIndex+1 >= state.totalRounds ? 'See Final Results' : 'Next Round'}</button>
          <button class="secondary" id="viewMap">View Map</button>
        </div>
      </div>
    </section>
  `;

  if (anyPerfect) playCorrect();
  else if (allWeak) playWrong();
  else playTransition();

  $('#nextRound').addEventListener('click', ()=>{
    playSelect();
    state.roundIndex += 1;
    if (state.roundIndex >= state.totalRounds){
      go('final');
    } else {
      startRound();
    }
  });
  $('#viewMap').addEventListener('click', ()=>{
    playClick();
    openModal(`<h3>Round Map</h3><p class="sub">Epicenter: ${STATION_BY_CODE[ev.epicenterCode].name} · Linked: ${ev.downstreamCodes.map(c=>STATION_BY_CODE[c].name).join(', ') || 'none'}</p><div class="map-wrap" id="mmm" style="aspect-ratio:4/3"></div><div class="row" style="margin-top:14px"><button class="primary end" id="mmClose">Close</button></div>`);
    $('#mmm').appendChild(renderMap(true));
    $('#mmClose').addEventListener('click', closeModal);
  });
}

function renderResultCard(r){
  const t = r.team;
  const ans = t.roundAnswers;
  const ev = state.currentEvent;
  const pressure = ev.pressure;
  const intensity = t.code === ev.epicenterCode ? 'strong'
                  : ev.downstreamCodes.includes(t.code) ? 'weak' : 'normal';

  const expectedExc = intensity === 'normal' ? [] :
                      intensity === 'weak' ? (pressure.weakExceedances || pressure.exceedances) :
                      pressure.exceedances;
  const selectedThresh = ans ? ans.thresholds : [];

  return `
    <div class="result-team">
      <div class="meta" style="display:flex; justify-content:space-between; align-items:center">
        <h4>${escapeHtml(t.name)} <span style="color:var(--mute); font-size:12px; font-family:'JetBrains Mono',monospace">· ${t.code}</span></h4>
        <span class="country" style="font-size:11px; color:var(--mute); font-family:'JetBrains Mono',monospace">${intensity === 'strong' ? 'EPICENTER' : intensity === 'weak' ? 'DOWNSTREAM' : 'BASELINE'}</span>
      </div>
      <div class="score-block">
        <span class="big-score">+${r.total}</span>
        <span class="max-score">/ 10</span>
        ${r.crossBorder ? '<span class="tag amber" style="margin-left:auto">Cross-border bonus</span>' : ''}
      </div>
      <div class="breakdown">
        <div class="bd-row"><span>Classification</span><span>${r.breakdown.classification} / 3 ${ans && ans.classification === pressure.id ? '✓' : '✗'}</span></div>
        <div class="bd-row"><span>Thresholds</span><span>${r.breakdown.thresholds} / 2</span></div>
        <div class="bd-row"><span>Intervention</span><span>${r.breakdown.intervention} / 3 ${ans && ans.intervention === pressure.intervention ? '✓' : '✗'}</span></div>
        <div class="bd-row"><span>Advisory</span><span>${r.breakdown.advisory} / 2 ${ans && ans.advisory === pressure.advisory ? '✓' : '✗'}</span></div>
        ${r.crossBorder ? `<div class="bd-row"><span>Cross-border</span><span>+1</span></div>` : ''}
        <div class="bd-row" style="margin-top:6px; padding-top:6px; border-top:1px dashed var(--line)"><span>Total score</span><span>${t.score} pts</span></div>
        ${t.exchangeLog.length ? `<div style="margin-top:8px; font-size:11px; color:var(--mute)">Exchanges: ${t.exchangeLog.length}</div>` : ''}
      </div>
    </div>
  `;
}

// --- FINAL ---
function renderFinal(){
  // Sort teams
  const sorted = state.teams.slice().sort((a,b)=> b.score - a.score);
  const top = sorted[0];

  const podiumOrder = [];
  if (sorted.length >= 2) podiumOrder.push(sorted[1]); // second on left
  podiumOrder.push(sorted[0]);                         // first in center
  if (sorted.length >= 3) podiumOrder.push(sorted[2]); // third on right

  stage.innerHTML = `
    <section class="screen">
      <div class="panel">
        <div class="kicker">Mission complete</div>
        <h2 class="display-title" style="font-size:52px">Final <em>Guardian</em> ranking</h2>
        <p class="lead">Some decisions improved the system. Some merely sounded energetic. What matters is that evidence was read, choices were made, and the water was treated as something worth understanding.</p>

        <div class="podium">
          ${podiumOrder.map((t, i) => {
            const rank = sorted.indexOf(t) + 1;
            const cls = rank === 1 ? 'first' : rank === 2 ? 'second' : 'third';
            return `
              <div class="pod ${cls}">
                <div class="country-tag">${t.code} · ${STATION_BY_CODE[t.code].name}</div>
                <div class="rank">${rank === 1 ? 'I' : rank === 2 ? 'II' : 'III'}</div>
                <div class="name">${escapeHtml(t.name)}</div>
                <div class="final-score">${t.score} pts</div>
              </div>
            `;
          }).join('')}
        </div>

        <hr class="div">
        <div class="kicker">Full standings</div>
        <div class="result-teams" style="margin-top:10px">
          ${sorted.map((t, idx) => `
            <div class="result-team">
              <div class="meta" style="display:flex; justify-content:space-between; align-items:center">
                <h4>${idx+1}. ${escapeHtml(t.name)}</h4>
                <span class="country" style="font-size:11px; color:var(--mute); font-family:'JetBrains Mono',monospace">${t.code}</span>
              </div>
              <div class="score-block"><span class="big-score">${t.score}</span><span class="max-score">/ ${state.totalRounds * 10}</span></div>
              <div class="breakdown">
                <div class="bd-row"><span>Intel credits left</span><span>${t.credits}</span></div>
                <div class="bd-row"><span>Tokens unused</span><span>${t.tokens}</span></div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="narration" style="margin-top:24px">
          The mission is complete.<br>
          The river will continue to have opinions, and the measurements will continue to be real.<br>
          That is a strong place to begin.
        </div>

        <div class="actions" style="margin-top:16px">
          <button class="primary" id="playAgain">New Mission</button>
          <button class="secondary" id="backHomeFinal">Return to Home</button>
        </div>
      </div>
    </section>
  `;

  chord([523, 659, 784, 988], 0.6, 'sine', 0.02);

  $('#playAgain').addEventListener('click', ()=>{
    playSelect();
    state.teams.forEach(t => { t.score=0; t.credits=5; t.tokens=2; });
    state.roundIndex = 0;
    state.usedPressureTypes = [];
    state.currentEvent = null;
    startRound();
  });
  $('#backHomeFinal').addEventListener('click', ()=>{
    playSelect();
    state.teams = [];
    go('home');
  });
}

// =========================================================
// INIT
// =========================================================
$('#audioToggle').addEventListener('click', ()=>{
  state.audioEnabled = !state.audioEnabled;
  $('#audioToggle').textContent = 'Audio: ' + (state.audioEnabled ? 'On' : 'Off');
  if (state.audioEnabled){ unlockAudio(); ambientStart(); }
  else ambientStop();
});
$('#howToBtn').addEventListener('click', ()=>{ unlockAudio(); playClick(); showHowTo(); });
$('#resetBtn').addEventListener('click', ()=>{
  openModal(`<h3>Reset mission?</h3><p class="sub">All current progress will be lost.</p><div class="row" style="margin-top:14px"><button class="secondary" id="cancelReset">Cancel</button><button class="primary end" id="confirmReset">Reset</button></div>`);
  $('#cancelReset').addEventListener('click', closeModal);
  $('#confirmReset').addEventListener('click', ()=>{
    closeModal();
    state.teams = [];
    state.roundIndex = 0;
    state.usedPressureTypes = [];
    state.currentEvent = null;
    state.activeTeamIdx = null;
    go('home');
  });
});

// Start
go('home');
</script>
</body>
